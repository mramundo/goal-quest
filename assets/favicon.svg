<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#2a1f14"/>
      <stop offset="1"   stop-color="#120d07"/>
    </linearGradient>
    <linearGradient id="shield" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#f1d78f"/>
      <stop offset=".55" stop-color="#e0b94a"/>
      <stop offset="1"   stop-color="#a86a2b"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".4" r=".6">
      <stop offset="0" stop-color="#fff3c4" stop-opacity=".75"/>
      <stop offset="1" stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- background plate -->
  <rect x="0" y="0" width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect x="1" y="1" width="62" height="62" rx="13" fill="none"
        stroke="#e0b94a" stroke-opacity=".24" stroke-width="1"/>

  <!-- soft halo -->
  <circle cx="32" cy="28" r="22" fill="url(#glow)"/>

  <!-- shield (quest marker) -->
  <path d="M32 9 L50 15 L50 31 Q50 46 32 55 Q14 46 14 31 L14 15 Z"
        fill="url(#shield)"
        stroke="#8b5a1a" stroke-width="1.6" stroke-linejoin="round"/>

  <!-- bold check (quest done motif) -->
  <path d="M22 31 L29 38 L43 22"
        fill="none"
        stroke="#2a1f14" stroke-width="5.2"
        stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M22 31 L29 38 L43 22"
        fill="none"
        stroke="#fff7d6" stroke-width="2.4"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
