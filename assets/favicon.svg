<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"   stop-color="#2a1f14"/>
      <stop offset="1"   stop-color="#120d07"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"    stop-color="#fff3c4"/>
      <stop offset=".45"  stop-color="#f1d78f"/>
      <stop offset="1"    stop-color="#c78a2b"/>
    </linearGradient>
    <radialGradient id="glow" cx=".5" cy=".5" r=".55">
      <stop offset="0" stop-color="#fff3c4" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fff3c4" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Dark squared plate with a thin gold rim -->
  <rect x="0" y="0" width="64" height="64" rx="4" fill="url(#bg)"/>
  <rect x="1.5" y="1.5" width="61" height="61" rx="3" fill="none"
        stroke="#e0b94a" stroke-opacity=".35" stroke-width="1"/>

  <!-- Soft halo behind the sparkle -->
  <circle cx="32" cy="32" r="22" fill="url(#glow)"/>

  <!-- Primary 4-point sparkle (same silhouette as #i-sparkle) -->
  <path d="M32 5 L37.3 26.6 L58.7 32 L37.3 37.3 L32 58.7 L26.6 37.3 L5.3 32 L26.6 26.6 Z"
        fill="url(#gold)"
        stroke="#8b5a1a" stroke-width="1.4" stroke-linejoin="round"/>

  <!-- Faint secondary accents for depth -->
  <circle cx="14" cy="14" r="1.3" fill="#f1d78f" opacity=".75"/>
  <circle cx="50" cy="50" r="1.1" fill="#f1d78f" opacity=".6"/>
  <circle cx="52" cy="14" r=".9"  fill="#fff3c4" opacity=".5"/>
</svg>
