name: 🛡️ Richiesta accesso al Regno
description: Compila la pergamena per chiedere di entrare in Goal Quest.
title: "[Access] "
labels: ["registration"]
body:
  - type: markdown
    attributes:
      value: |
        Stai richiedendo l'accesso a **Goal Quest**. Il Sovrano (admin) valuterà la
        richiesta e, se approvata, aggiungerà il tuo nome a `data/users.json`.

  - type: input
    id: username
    attributes:
      label: Username
      description: Lettere, numeri, `_`, `-`. Usato per entrare nel sito.
      placeholder: merlino42
    validations:
      required: true

  - type: input
    id: display-name
    attributes:
      label: Nome in-game
      description: Il nome visualizzato nelle leaderboard.
      placeholder: Merlino il Saggio
    validations:
      required: true

  - type: input
    id: email
    attributes:
      label: Email (per avvisi)
      placeholder: tu@regno.it
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: Motivo della quest
      description: Cosa vuoi ottenere con Goal Quest?
      placeholder: "Voglio raggiungere obiettivi di..."
    validations:
      required: true

  - type: input
    id: pin-hash
    attributes:
      label: Hash del PIN (SHA-256)
      description: |
        Generato automaticamente dal form sul sito. NON inserire il PIN in chiaro.
        L'admin copia questa stringa dentro il campo `pinHash` di `users.json`.
    validations:
      required: true
