name: Approve registration

# Quando un'issue con label "registration" viene taggata anche "approved"
# il workflow appende l'utente a data/users.json, commit e chiude l'issue.

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  issues: write

jobs:
  approve:
    if: github.event.label.name == 'approved' && contains(github.event.issue.labels.*.name, 'registration')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Parse issue form
        id: parse
        uses: stefanbuck/github-issue-parser@v3
        with:
          template-path: .github/ISSUE_TEMPLATE/registration.yml

      - name: Append user to users.json
        env:
          USERNAME: ${{ steps.parse.outputs.issueparser_username }}
          DISPLAY_NAME: ${{ steps.parse.outputs.issueparser_display-name }}
          PIN_HASH: ${{ steps.parse.outputs.issueparser_pin-hash }}
        run: |
          set -e
          node <<'EOF'
          const fs = require('fs');
          const path = 'data/users.json';
          const raw = fs.readFileSync(path, 'utf8');
          const users = JSON.parse(raw);
          const username = process.env.USERNAME.trim();
          if (users.some(u => u.username.toLowerCase() === username.toLowerCase())) {
            console.log('User already exists, skipping.');
            process.exit(0);
          }
          const id = 'usr_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
          users.push({
            id,
            username,
            displayName: process.env.DISPLAY_NAME.trim(),
            pinHash: process.env.PIN_HASH.trim(),
            createdAt: new Date().toISOString(),
            totalXp: 0,
            title: 'Novizio'
          });
          fs.writeFileSync(path, JSON.stringify(users, null, 2) + '\n');
          console.log('Added user', username);
          EOF

      - name: Commit
        run: |
          git config user.name "goal-quest-bot"
          git config user.email "bot@goal-quest"
          git add data/users.json
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "feat(users): approve ${{ github.event.issue.number }}"
            git push
          fi

      - name: Comment + close
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '🛡️ Benvenuto nel Regno! Il tuo accesso è stato approvato, puoi entrare dal ponte levatoio.'
            });
            await github.rest.issues.update({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              state: 'closed'
            });
